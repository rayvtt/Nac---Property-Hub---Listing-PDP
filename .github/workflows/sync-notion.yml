name: Sync Notion → PDP HTML

on:
  schedule:
    # every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch:
    # allow manual trigger from the Actions tab

concurrency:
  group: sync-notion
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Run sync
        working-directory: scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || '35848ec25e86803283acc7ad989649c9' }}
        run: node sync-notion.mjs

      - name: Commit changes
        run: |
          git config user.name "nac-notion-bot"
          git config user.email "nac-notion-bot@users.noreply.github.com"
          if git diff --quiet -- properties/; then
            echo "No HTML changes."
            exit 0
          fi
          git add properties/
          git commit -m "chore(notion-sync): refresh PDP content from Notion"
          git push origin main
