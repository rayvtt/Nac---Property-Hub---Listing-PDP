name: Sync Brochure HTML → WordPress

on:
  push:
    branches: [main]
    paths:
      - "properties/turkey-cbi.html"
      - "properties/cyprus-rbi.html"
      - "properties/greece-golden-visa.html"
      - "properties/malaysia-mm2h.html"
      - "properties/malta-mprp.html"
      - "properties/new-zealand-rbi.html"
      - "properties/panama-rbi.html"
      - "properties/portugal-golden-visa.html"
      - "properties/st-kitts-cbi.html"
      - "properties/thailand-ltr.html"
      - "properties/uae-golden-visa.html"
      - "properties/uk-innovator-visa.html"
      - "scripts/sync-brochures-wp.mjs"
      - ".github/workflows/sync-brochures-wp.yml"
  workflow_dispatch:
    inputs:
      only_slug:
        description: "Sync just one brochure slug (e.g. panama-rbi). Leave empty to sync all 12."
        required: false
        default: ""

concurrency:
  group: sync-brochures-wp
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Push brochures to WordPress
        working-directory: scripts
        env:
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_USER: ${{ vars.WP_USER || 'admin_web' }}
          WP_BASE_URL: ${{ vars.WP_BASE_URL || 'https://nomadassetcollective.com' }}
          WP_ACF_FIELD: ${{ vars.WP_ACF_FIELD || 'raw_html_code' }}
          ONLY_SLUG: ${{ github.event.inputs.only_slug }}
        run: node sync-brochures-wp.mjs
